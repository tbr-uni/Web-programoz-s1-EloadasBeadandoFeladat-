<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pizza Nyilvántartás</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="bg-dark text-white py-4">
    <div class="container text-center">
        <h1>Web programozás-1 Előadás Házi feladat</h1>
    </div>
</header>


    <nav class="navbar navbar-expand-lg bg-white shadow-sm mb-4">
        <div class="container">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active " href="javascript.html">JAVASCRIPT</a></li>
                    <li class="nav-item"><a class="nav-link" href="react.html">REACT</a></li>
                    <li class="nav-item"><a class="nav-link" href="spa.html">SPA</a></li>
                    <li class="nav-item"><a class="nav-link" href="fetchapi.html">FETCHAPI</a></li>
                    <li class="nav-item"><a class="nav-link" href="/axios/axios.html">AXIOS</a></li>
                    <li class="nav-item"><a class="nav-link" href="oojs.html">OOJS</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h1><center>Pizza Adatbázis</center></h1>
        <hr>

        <div class="pizza-form">
            <form onsubmit="event.preventDefault(); onFormSubmit();" autocomplete="off">
                <div>
                    <label>Pizza neve*</label>
                    <label class="validation-error hide" id="nevValidationError">A név megadása kötelező.</label>
                    <input type="text" name="pizzaNev" id="pizzaNev" placeholder="Példa: Margherita">
                </div>
                
                <div>
                    <label>Kategória</label>
                    <input type="text" name="kategoria" id="kategoria" placeholder="Példa: király, lovag...">
                </div>
                
                <div style="display: flex; align-items: center; gap: 10px; margin: 10px 0;">
                    <label>Vegetáriánus?</label>
                    <input type="checkbox" name="isVega" id="isVega">
                </div>

                <div class="form-action-buttons">
                    <input type="submit" value="Mentés">
                </div>
            </form>
        </div>

        <br/>

        <div class="pizza-table">
            <table class="list" id="pizzaList">
                <thead>
                    <tr>
                        <th>Név</th>
                        <th>Kategória</th>
                        <th>Vega?</th>
                        <th>Műveletek</th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
