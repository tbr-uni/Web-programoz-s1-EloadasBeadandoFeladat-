<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza CRUD - Fetch API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .nav-link.active { font-weight: bold; color: #0d6efd !important; border-bottom: 2px solid #0d6efd; }
        .table small { font-size: 0.85em; color: #777; }
        .sticky-form { position: sticky; top: 20px; }
    </style>
</head>
<body>

    <header class="bg-dark text-white py-4 text-center shadow">
        <h1>Web programozás-1 - Pizza Projekt</h1>
    </header>

    <nav class="navbar navbar-expand-lg bg-white shadow-sm mb-4">
        <div class="container">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="javascript.html">JAVASCRIPT</a></li>
                    <li class="nav-item"><a class="nav-link" href="react.html">REACT</a></li>
                    <li class="nav-item"><a class="nav-link" href="spa.html">SPA</a></li>
                    <li class="nav-item"><a class="nav-link active" href="fetchapi.html">FETCHAPI</a></li>
                    <li class="nav-item"><a class="nav-link" href="/axios/axios.html">AXIOS</a></li>
                    <li class="nav-item"><a class="nav-link" href="oojs.html">OOJS</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-4">
        <div class="row">
            <div class="col-xl-3 col-lg-4">
                <div class="card shadow-sm p-4 border-0 sticky-form">
                    <h3 id="addedit" class="h5 mb-3 text-primary">Új rendelés felvétele</h3>
                    <p id="message"></p>
                    <form id="orderForm">
                        <input type="hidden" id="az">
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Pizza</label>
                            <select id="pizzanev" class="form-select" required>
                                <option value="">Válassz...</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Darabszám</label>
                            <input type="number" id="darab" class="form-control" min="1" value="1" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Felvétel ideje</label>
                            <input type="text" id="felvetel" class="form-control" placeholder="YYYY-MM-DD HH:MM:SS">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Kiszállítás ideje</label>
                            <input type="text" id="kiszallitas" class="form-control" placeholder="YYYY-MM-DD HH:MM:SS">
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">Mentés</button>
                            <button type="button" id="cancelBtn" class="btn btn-secondary" style="display:none;" onclick="cancelEdit()">Mégse</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="col-xl-9 col-lg-8">
                <div class="card shadow-sm border-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-dark">
                                <tr>
                                    <th>#</th>
                                    <th>Pizza típusa</th>
                                    <th>Menny.</th>
                                    <th>Felvétel</th>
                                    <th>Kiszállítás</th>
                                    <th style="min-width: 160px;">Műveletek</th>
                                </tr>
                            </thead>
                            <tbody id="orderTable"></tbody>
                        </table>
                    </div>
                    <div class="p-3 text-center bg-light border-top">
                        <button id="loadMoreBtn" class="btn btn-outline-primary px-5" onclick="loadMore()">További rendelések betöltése...</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="fetch_script.js"></script>
</body>
</html>
